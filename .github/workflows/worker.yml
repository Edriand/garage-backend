# Copia este archivo a .github/workflows/worker.yml en cada repo cliente.
# Solo necesita el secret GH_TOKEN (tu GitHub PAT con scope repo+workflow).

name: Trigger Worker Agent

on:
  issues:
    types: [assigned]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'Edriand',
              repo: 'agent-system',
              event_type: 'run-worker',
              client_payload: {
                project_owner: context.repo.owner,
                project_repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                project_number: 2
              }
            })
